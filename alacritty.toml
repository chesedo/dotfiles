[window]
padding = { x = 10, y = 10 }
dynamic_padding = true
opacity = 0.95

[bell]
animation = "EaseOutExpo"
color = "#ffffff"
duration = 300

[colors.bright]
black = "#38305A"
red = "#C04848"        # Bright red (errors, diffs)
green = "#6878A0"      # Blue-grey stone
yellow = "#8858C8"     # Purple accent (no yellow)
blue = "#4A70AA"       # Steel blue cliffs
magenta = "#8858C8"    # Purple accent
cyan = "#7898C0"       # Pale glacier blue
white = "#DDE2EC"

[colors.normal]
black = "#282348"
red = "#A03838"        # Muted red (errors, diffs)
green = "#506080"      # Deep slate blue
yellow = "#6A40A8"     # Dark purple (no yellow)
blue = "#38305A"       # Dark indigo
magenta = "#6A40A8"    # Dark purple
cyan = "#6878A0"       # Blue-grey muted
white = "#A8B0C8"      # Dimmed silver

[colors.primary]
background = "#1A1830"
foreground = "#DDE2EC"

[font]
size = 10.0

[font.bold]
family = "FiraCode Nerd Font"
style = "Bold"

[font.italic]
family = "FiraCode Nerd Font"
style = "Italic"

[font.normal]
family = "FiraCode Nerd Font"
style = "Regular"
